<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validar Boleto - Karla & Jose</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;600;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
    <link rel="stylesheet" href="css/validar-boleto.css">
</head>
<body>
    <div class="ticket-container">
        <div class="ticket-watermark">
            <img src="img/logo2.webp" alt="Watermark">
        </div>

        <div class="ticket-header">
            <h1>VALIDACIÓN DE BOLETOS</h1>
            <p>Boda de Karla & Jose</p>
        </div>

        <div class="ticket-body" id="ticket-body" style="display: none;">
            <div class="validation-badge">✓ Invitación Válida</div>

            <div class="guest-list">
                <label>Invitados Confirmados</label>
                <div class="guest-value" id="guest-list">—</div>
            </div>

            <div class="ticket-code">
                <label>Código de Validación</label>
                <div class="code-value" id="code-value">—</div>
            </div>
        </div>

        <div class="ticket-body" id="error-body">
            <div class="error-message" id="error-message">Código inválido o no proporcionado</div>
        </div>

        <div class="ticket-body" id="loading-body" style="display: none;">
            <div style="font-size: 18px; color: #2E8B57;">Verificando...</div>
        </div>
    </div>

    <script src="js/validar-boleto.js"></script>
</body>
</html>
</html>
